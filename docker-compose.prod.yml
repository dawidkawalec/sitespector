services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sitespector-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sitespector-internal
    restart: unless-stopped

  # Vector DB (RAG) - Qdrant (internal-only)
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: sitespector-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sitespector-internal
    restart: unless-stopped

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitespector-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    volumes:
      - ./tmp/audits:/tmp/audits
      - chat_attachments_data:/data/chat-attachments
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sitespector-internal
      - sitespector-external
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitespector-worker
    command: python worker.py
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    volumes:
      - ./tmp/audits:/tmp/audits
      - /var/run/docker.sock:/var/run/docker.sock:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - sitespector-internal
      - sitespector-external
    restart: unless-stopped

  # Screaming Frog Crawler
  screaming-frog:
    platform: linux/amd64
    build:
      context: ./docker/screaming-frog
      dockerfile: Dockerfile
    container_name: sitespector-screaming-frog
    entrypoint: ["tail", "-f", "/dev/null"]
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./tmp/crawls:/tmp/crawls
    networks:
      - sitespector-external
    restart: unless-stopped

  # Lighthouse Auditor
  lighthouse:
    build:
      context: ./docker/lighthouse
      dockerfile: Dockerfile
    container_name: sitespector-lighthouse
    entrypoint: ["tail", "-f", "/dev/null"]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./tmp/lighthouse:/tmp/lighthouse
    networks:
      - sitespector-external
    restart: unless-stopped

  # Landing Page (Next.js) – LP + login/register (ta sama nawigacja 1:1)
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=https://ljimahizqgewhvrgqhyx.supabase.co
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqaW1haGl6cWdld2h2cmdxaHl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTUyNTIsImV4cCI6MjA4NTczMTI1Mn0.oiytWEKYE83nI7OGrsw8aCpMfuKOwhn2Dy3GHsyqfP8
        - NEXT_PUBLIC_APP_URL=https://sitespector.app
    container_name: sitespector-landing
    command: node server.js
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3001
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      - sitespector-internal
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://sitespector.app
        - NEXT_PUBLIC_SUPABASE_URL=https://ljimahizqgewhvrgqhyx.supabase.co
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqaW1haGl6cWdld2h2cmdxaHl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTUyNTIsImV4cCI6MjA4NTczMTI1Mn0.oiytWEKYE83nI7OGrsw8aCpMfuKOwhn2Dy3GHsyqfP8
    container_name: sitespector-frontend
    command: node server.js
    environment:
      - NEXT_PUBLIC_API_URL=https://sitespector.app
      - NEXT_PUBLIC_SUPABASE_URL=https://ljimahizqgewhvrgqhyx.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqaW1haGl6cWdld2h2cmdxaHl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTUyNTIsImV4cCI6MjA4NTczMTI1Mn0.oiytWEKYE83nI7OGrsw8aCpMfuKOwhn2Dy3GHsyqfP8
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      - sitespector-internal
    restart: unless-stopped

  # Dozzle - Docker Logs Viewer (accessible ONLY via SSH tunnel, NOT exposed via nginx)
  dozzle:
    image: amir20/dozzle:v8.8.1
    container_name: sitespector-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_BASE=/logs
      - DOZZLE_FILTER=name=sitespector-*
      - DOZZLE_NO_ANALYTICS=true
    networks:
      - sitespector-internal
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: sitespector-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - landing
      - frontend
      - backend
    networks:
      - sitespector-internal
      - sitespector-external
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  chat_attachments_data:
    driver: local

networks:
  sitespector-internal:
    driver: bridge
    internal: true
  sitespector-external:
    driver: bridge
